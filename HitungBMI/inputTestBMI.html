<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
    <script>
        // Mendefinisikan fungsi fallback gambar di awal (head) 
        // agar siap dipanggil ketika elemen HTML gambar dimuat
        function handleImageError(img) {
            img.src = "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=600&auto=format&fit=crop";
        }
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>KALKULATOR BMI</h1>
            <p>Periksa berat badan ideal Anda secara akurat</p>
        </header>

        <!-- Form Input -->
        <div class="input-group">
            <label for="tinggi-badan">Tinggi Badan</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-ruler-vertical"></i>
                <input type="number" id="tinggi-badan" placeholder="Contoh: 170" required>
                <span class="input-unit">cm</span>
            </div>
        </div>

        <div class="input-group">
            <label for="berat-badan">Berat Badan</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-weight-scale"></i>
                <input type="number" id="berat-badan" placeholder="Contoh: 60" required>
                <span class="input-unit">kg</span>
            </div>
        </div>

        <button id="hitung" onclick="hitungBMI()">
            <i class="fa-solid fa-calculator"></i> Hitung BMI
        </button>

        <!-- Wadah Hasil -->
        <div class="result-card" id="result-card">
            <p class="result-title">Skor BMI Anda</p>
            <div id="hasil">0.00</div>
            <div id="keterangan">-</div>
            
            <div class="image-container">
                <!-- Menggunakan spacer transparan di awal agar tidak memicu error gambar rusak sebelum dihitung -->
                <img id="gambar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Ilustrasi Status BMI" onerror="handleImageError(this)">
            </div>
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>
</html>
