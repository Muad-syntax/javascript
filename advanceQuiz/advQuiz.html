                <span>=</span>
                <span>?</span>

                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>

        <div id="container-pembagian">
            <label>Pembagian</label>
            <div class="soal-bagi">
                <span class="soal1"></span>
                <span>/</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>

                <input type="text" class="jawaban" placeholder="jawab">
                <button class="btn-jawab">Jawab</button>
                <button class="btn-lanjut">Lanjut</button>

                <p class="jawaban-komputer"></p>

                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>

        <div id="container-pengurangan">
            <label>Pengurangan</label>
            <div class="soal-kurang">
                <span class="soal1"></span>
                <span>-</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>

                <input type="text" class="jawaban" placeholder="jawab">
                <button class="btn-jawab">Jawab</button>
