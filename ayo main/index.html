<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayo Main</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="heading">
        <nav class="navbar">
            <a href="#container-perkalian">Perkalian</a>
            <a href="#container-pembagian">Pembagian</a>
            <a href="#container-penambahan">Penambahan</a>
            <a href="#container-pengurangan">Pengurangan</a>
        </nav>
    </header>

    <main class="main">
        <div id="container-perkalian">
            <label>Perkalian</label>
            <div class="soal-kali">
                <span class="soal1"></span>
                <span>x</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>
                <input type="text" class="jawaban">
                <button class="btn-jawab">Jawab</button>
                <button class="btn-lanjut">Lanjut</button>
                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>
        <div id="container-pembagian">
            <label>Pembagian</label>
            <div class="soal-bagi">
                <span class="soal1"></span>
                <span>:</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>
                <input type="text" class="jawaban">
                <button class="btn-jawab">Jawab</button>
                <button class="btn-lanjut">Lanjut</button>
                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>
        <div id="container-penambahan">
            <label>Penambahan</label>
            <div class="soal-tambah">
                <span class="soal1"></span>
                <span>+</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>
                <input type="text" class="jawaban">
                <button class="btn-jawab">Jawab</button>
                <button class="btn-lanjut">Lanjut</button>
                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>
        <div id="container-pengurangan">
            <label>Pengurangan</label>
            <div class="soal-kurang">
                <span class="soal1"></span>
                <span>-</span>
                <span class="soal2"></span>
                <span>=</span>
                <span>?</span>
                <input type="text" class="jawaban">
                <button class="btn-jawab">Jawab</button>
                <button class="btn-lanjut">Lanjut</button>
                <p class="status"></p>
                <p class="jawaban-komputer"></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-info">
                <h3>Ayo Main</h3>
                <p>Belajar matematika jadi lebih menyenangkan!</p>
            </div>
            <div class="footer-links">
                <a href="#">Tentang Kami</a>
                <a href="#">Kontak</a>
                <a href="#">Bantuan</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Ayo Main. Hak Cipta Dilindungi.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
