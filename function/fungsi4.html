<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // sudo variable arguments
        function tambah(){
            var hasil = 0;
            for(var i = 0; i < arguments.length; i++){
                hasil += arguments[i];
            }
            return hasil;
        }
        var coba = tambah(1,2,3,4,5,6,7,8,9,20);
        document.write(coba);

    </script>
</body>
</html>
