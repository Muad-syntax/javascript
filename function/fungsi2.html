<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // (a, b) = parameter
        function jumlahVolumeDuaKubus(a, b) {
            var volumeA;
            var volumeB;
            var total;

            volumeA = a * a * a;
            volumeB = b * b * b;

            total = volumeA + volumeB;
            return total;
        }
        var hasil = jumlahVolumeDuaKubus(8, 3)
        document.write(hasil)
        // (8, 3) = argument
    </script>
</body>
</html>
