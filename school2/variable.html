<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="judul">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quaerat adipisci modi aperiam ad veniam tempora numquam et, dolor impedit. Minus id nam amet atque officiis maiores aut placeat voluptatibus quod?</div>

        function ubahTeks() {
            let judul = document.getElementById("judul")
            judul.innerHTML = "<u><b>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quaerat adipisci modi aperiam ad veniam tempora numquam et, dolor impedit. Minus id nam amet atque officiis maiores aut placeat voluptatibus quod?</b></u>"

        }

    </script>
</body>
</html>
