<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Event Listener</h1>
    <button onclick="munculkanAlert()">Press Button</button>
    <input type="text" onkeydown="munculDiConsole()" onblur="munculkanAlert()">

    <script>
        function munculkanAlert(){
            alert("What are you doing?");
        }
        function munculDiConsole(){
            console.log("tes");
        }
    </script>
</body>
</html>
