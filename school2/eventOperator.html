<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="nilai1"><br>
    <input type="text" id="nilai2">
    <button id="kali">Kali</button>
    <button id="bagi">Bagi</button>
    <button id="tambah">Tambah</button>
    <button id="kurang">Kurang</button>
    <h1 id="tampil"></h1>
    <script>
        let tampil = document.getElementById("tampil");
        let tambah = document.getElementById("tambah");

        tambah.addEventListener("click", function () {
            let nilai1 = parseInt(document.getElementById("nilai1").value);
            let nilai2 = parseInt(document.getElementById("nilai2").value);

            let hasil = nilai1 + nilai2
            tampil.innerText = hasil

            console.log(hasil)
        })

    </script>
</body>

</html>
