<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai Kelulusan</title>
</head>

<body>
    <div class="container">
        <label>Masukan Nilai Siswa</label>
        <br>
        <input type="number" id="input-number">
        <br>
        <button id="btn-result">Cek</button>
        <br>
        <div id="result"></div>
        <div id="status"></div>
    </div>
    <script>
        let btnResult = document.getElementById('btn-result');
        let result = document.getElementById('result');
        let status = document.getElementById('status');
        function cekKelulusan() {
            let inputNumbr = document.getElementById('input-number').value;
            if (inputNumbr >= 75) {
                result.innerHTML = `<b>Nilai: ${inputNumbr}</b>`;
                status.innerHTML = "<b>LULUS</b>";
                status.style.color = "green";
            } else if (inputNumbr < 75) {
                result.innerHTML = `<b>Nilai: ${inputNumbr}</b>`;
                status.innerHTML = "<b>REMEDIAL</b>";
                status.style.color = "red";
            }
        }

        btnResult.addEventListener('click', function () {
            cekKelulusan()
        })
    </script>
</body>

</html>
